syntax="proto3";

package proto;

import "screen_message.proto";
import "processor_message.proto";
import "memory_message.proto";
import "storage_message.proto";
import "keyboard_message.proto";
import "google/protobuf/timestamp.proto";

option go_package="github.com/shriyash/grpc_practice/pb;pb";

import "laptop_message.proto";
import "filter_message.proto";

// This is the IDL (Interface Definition Language) for service
// Explains the data exchanged, RPC methods, the req and res formats
// Type of formal agreement between the client and server


// Defined the input to RPC
// every RPC func accepts one req/mssg (no mult args)
// defines the req sent by the client
message CreateLaptopRequest{
  Laptop laptop=1;
}

// Defines what the server wil return
// output of RPC server
message CreateLaptopResponse{
  string id=1;
}

// Define a req which can search for laptop with given specs
message SearchLaptopRequest{
  Filter filter=1;
}

// Define res which returns such laptop
message SearchLaptopResponse{
  Laptop laptop=1;
}

message UploadImageRequest{
  oneof data{
    ImageInfo info=1;
    bytes chunk_data=2;
  }
}

message ImageInfo{
  string laptop_id=1;
  string image_type=2;
}

message UploadImageResponse{
  string id=1;
  uint32 size=2;
}

message RateLaptopRequest{
  string laptop_id=1;
  double score=2;
}

message RateLaptopResponse{
  string laptop_id=1;
  uint32 rated_count=2;
  double average_score=3;
}


// Defines a general service
// Interface that the server must implement
service LaptopService{

  // rpc declares a remote function that can be called over a network
  // automatic serialize req, send over n/w, wait, deserialize
  // This tells: the server provides func named CreateLaptop.
  // We also mentioned the input/param of the func and the response type too.
  rpc CreateLaptop(CreateLaptopRequest)
      returns (CreateLaptopResponse){};

  // Creating kind of endpoint for searching laptop
  rpc SearchLaptop(SearchLaptopRequest)
      returns (stream SearchLaptopResponse) {};

  rpc UploadImage(stream UploadImageRequest)
      returns (UploadImageResponse){};

  rpc RateLaptop(stream RateLaptopRequest)
      returns (stream RateLaptopResponse){};
}

